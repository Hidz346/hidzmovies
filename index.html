*,*::before,*::after{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

:root{
  --bg:#141414;
  --bg2:#1a1a1a;
  --bg3:#222222;
  --bg4:#2a2a2a;

  --accent:#e50914;
  --accent2:#ff1e2d;
  --gold:#f5c518;
  --red:#e50914;
  --nav-h:76px;
  --shimmer: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0.03) 75%);
}

html,body{
  width:100%;
  min-height:100%;
  background:#141414;
  color:#e5e5e5;
  font-family:'Netflix Sans','Helvetica Neue',Helvetica,Arial,sans-serif;
  overflow-x:hidden;
  overflow-y: scroll; 
  scrollbar-gutter: stable;
}


body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top right, rgba(229,9,20,.06), transparent 40%),
    radial-gradient(circle at bottom left, rgba(180,0,10,.04), transparent 40%);
  pointer-events:none;
}

.noise{
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.015'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:9999;
}

@keyframes fade {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:none; }
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ===== NETFLIX SPLASH SCREEN ===== */

#splash-screen {
  position: fixed;
  top: 0; 
  left: 0; 
  width: 100%; 
  height: 100vh;
  background-color: #000000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10010;
  overflow: hidden;
  transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), 
              visibility 0.8s, 
              transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
}

.xyz-anim {
  font-family: 'Bebas Neue', 'Barlow', sans-serif;
  font-size: clamp(4rem, 12vw, 8rem);
  font-weight: 400;
  letter-spacing: 8px;
  color: #e50914;
  position: relative;
  text-shadow: 0 0 60px rgba(229,9,20,0.8), 0 0 100px rgba(229,9,20,0.4);
  animation: netflixReveal 2.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.xyz-anim::before {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 0%;
  height: 4px;
  background: #e50914;
  border-radius: 2px;
  animation: lineReveal 2.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  animation-delay: 0.3s;
}

.xyz-anim::after {
  content: 'HidzMovie';
  position: absolute;
  left: 0; 
  top: 0; 
  width: 100%; 
  height: 100%;
  color: #e50914;
  filter: blur(30px);
  opacity: 0;
  animation: netflixGlow 2.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  z-index: -1;
}

@keyframes netflixReveal {
  0% {
    letter-spacing: -10px;
    filter: blur(20px);
    opacity: 0;
    transform: scale(0.8);
  }
  30% {
    filter: blur(0px);
    opacity: 1;
  }
  70% {
    letter-spacing: 8px;
    transform: scale(1.02);
  }
  100% {
    letter-spacing: 8px;
    filter: blur(0px);
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes lineReveal {
  0% { width: 0%; }
  100% { width: 80%; }
}

@keyframes netflixGlow {
  0% { opacity: 0; }
  40% { opacity: 0.6; filter: blur(25px); }
  100% { opacity: 0; filter: blur(40px); }
}

.hidden {
  opacity: 0 !important;
  visibility: hidden !important;
  transform: scale(1.05) !important;
}

/* ===== SPLASH LOGO ===== */
.splash-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

.splash-logo {
  width: clamp(64px, 16vw, 96px);
  height: auto;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(229,9,20,0.6), 0 0 80px rgba(229,9,20,0.2);
  animation: netflixReveal 2.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

}

}

body[data-theme="light"] ::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,.25);
}

// ============================================================
// api.js
// ============================================================
// API Configuration and Global Variables
const API_KEY = "5a61a8e1df2f614dc83609925720c35d";
const BASE_URL = "https://api.themoviedb.org/3";
const IMG = "https://image.tmdb.org/t/p/w500";
const BACKDROP = "https://image.tmdb.org/t/p/original";
const FALLBACK = "https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=500";

let activePage = "home";
let pageStack = ["home"];
let currentItem = null;
let currentSeason = 1;
let currentEpisode = 1;

const itemMemoryCache = new Map();
const scrollHistoryMap = {};
let searchAbortController = null;
let detailAbortController = null; 

const CACHE_PREFIX = "streamex_cache_";
const CACHE_TTL = 24 * 60 * 60 * 1000; // 24 Jam

const FAV_KEY = "streamex_favs";
const HIST_KEY = "streamex_history";

// Cache Functions
function setCache(key, data) { 
  if(itemMemoryCache.size > 200) itemMemoryCache.clear();
  
  const cachePayload = JSON.stringify({ timestamp: Date.now(), payload: data });
  try {
    localStorage.setItem(CACHE_PREFIX + key, cachePayload); 
  } catch (e) {
    if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
      console.warn("Storage penuh. Membersihkan cache lama otomatis...");
      clearOldestCaches();
      try {
        localStorage.setItem(CACHE_PREFIX + key, cachePayload); 
      } catch (err) {
        console.error("Masih gagal menyimpan cache meskipun sudah dibersihkan.");
      }
    }
  }
}

function clearOldestCaches() {
  const caches = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(CACHE_PREFIX)) {
      try {
        const item = JSON.parse(localStorage.getItem(k));
        caches.push({ key: k, time: item.timestamp });
      } catch(e) {}
    }
  }
  
  caches.sort((a, b) => a.time - b.time);
  const half = Math.ceil(caches.length / 2);
  for (let i = 0; i < half; i++) {
    localStorage.removeItem(caches[i].key);
  }
}

function clearAppCache() {
  if (confirm("Apakah kamu yakin ingin menghapus SEMUA cache aplikasi?\nHalaman akan dimuat ulang.")) {
    const keysToRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(CACHE_PREFIX)) {
        keysToRemove.push(k);
      }
    }
    keysToRemove.forEach(k => localStorage.removeItem(k));
    itemMemoryCache.clear();
    alert("Semua cache berhasil dibersihkan!");
    window.location.reload();
  }
}

function getCache(key){
  try {
    const cached = localStorage.getItem(CACHE_PREFIX + key);
    if(!cached) return null;
    const cacheObj = JSON.parse(cached);
    if(Date.now() - cacheObj.timestamp > CACHE_TTL){
      localStorage.removeItem(CACHE_PREFIX + key); 
      return null;
    }
    return cacheObj.payload;
  } catch(e) {
    localStorage.removeItem(CACHE_PREFIX + key);
    return null;
  }
}

// Favorites Functions
function getFavs(){ return JSON.parse(localStorage.getItem(FAV_KEY)||"[]"); }
function saveFavs(data){ localStorage.setItem(FAV_KEY,JSON.stringify(data)); }
function isFav(id, mediaType){ return getFavs().some(x => x.id == id && (x.media_type || "movie") === (mediaType || "movie")); }

// History Functions
function getHistory(){ return JSON.parse(localStorage.getItem(HIST_KEY)||"[]"); }
function saveHistory(data){ localStorage.setItem(HIST_KEY,JSON.stringify(data)); }

function addToHistory(item, season = null, episode = null){
  let hist = getHistory();
  const type = item.type || item.media_type || "movie";
  hist = hist.filter(x => !(x.id == item.id && (x.media_type || "movie") === type));
  hist.unshift({
    id: item.id, media_type: type, title: item.title || item.name, poster_path: item.poster_path,
    vote_average: item.vote_average, release_date: item.release_date, first_air_date: item.first_air_date,
    lastSeason: season, lastEpisode: episode, trackTime: new Date().toLocaleDateString('id-ID', {day: 'numeric', month: 'short'})
  });
  if(hist.length > 30) hist.pop();
  saveHistory(hist);
}

// TMDB API Functions
async function fetchTMDB(endpoint, signal = null){
  const localData = getCache(endpoint);
  if(localData) return localData;
  const url = `${BASE_URL}${endpoint}${endpoint.includes("?") ? "&" : "?"}api_key=${API_KEY}`;
  const options = signal ? { signal } : {};
  const res = await fetch(url, options);
  if(!res.ok) throw new Error(`HTTP Error: ${res.status}`);
  const data = await res.json();
  setCache(endpoint, data);
  return data;
}

// Helper Functions
function img(path){ return path ? IMG + path : FALLBACK; }
function backdrop(path){ return path ? BACKDROP + path : FALLBACK; }
function esc(text){ return text ? text.replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/'/g, "&#39;").replace(/"/g, "&quot;") : ""; }

function debounce(func, wait) {
  let timeout;
  return function(...args) {
    clearTimeout(timeout);
    timeout = setTimeout(() => func.apply(this, args), wait);
  };
}

// Plays the official YouTube trailer for the item (via TMDB /videos endpoint).
async function updatePlayer() {
  const loader = document.getElementById("playerLoader");
  const note = document.getElementById("trailerNote");
  loader.classList.add("active");
  document.getElementById("loaderTxt").innerText = "MEMUAT TRAILER...";
  note.innerHTML = "";
  stopPlayer();

  const type = currentItem.type || currentItem.media_type || "movie";
  document.getElementById("watchTitle").innerHTML = currentItem.title;

  try {
    const data = await fetchTMDB(`/${type}/${currentItem.id}/videos`);
    const vids = data.results || [];
    const trailer =
      vids.find(v => v.site === "YouTube" && v.type === "Trailer" && v.official) ||
      vids.find(v => v.site === "YouTube" && v.type === "Trailer") ||
      vids.find(v => v.site === "YouTube" && v.type === "Teaser") ||
      vids.find(v => v.site === "YouTube");

    const playerFrame = document.getElementById("player");
    if (trailer) {
      playerFrame.src = `https://www.youtube-nocookie.com/embed/${trailer.key}?rel=0&modestbranding=1`;
      playerFrame.onload = () => loader.classList.remove("active");
      note.innerHTML = `<a href="https://www.youtube.com/watch?v=${trailer.key}" target="_blank" rel="noopener"><i class="fab fa-youtube"></i> Tonton di YouTube</a>`;
    } else {
      playerFrame.src = "about:blank";
      loader.classList.remove("active");
      note.innerHTML = `<i class="fas fa-circle-info"></i>Trailer resmi belum tersedia untuk judul ini.`;
    }
  } catch (err) {
    loader.classList.remove("active");
    note.innerHTML = `<i class="fas fa-circle-info"></i>Gagal memuat trailer.`;
  }

  addToHistory(currentItem, type === "tv" ? currentSeason : null, null);
  renderProviders(currentItem.id, type);
}

// Shows legal streaming/rent/buy platforms for the item (via TMDB /watch/providers,
// data sourced from JustWatch — attribution is displayed in the UI as required by TMDB's terms).
async function renderProviders(id, type) {
  const wrap = document.getElementById("providerRow");
  const attribution = document.getElementById("jwAttribution");
  wrap.innerHTML = `<div class="loading">Memuat info platform...</div>`;
  attribution.style.display = "none";
  try {
    const data = await fetchTMDB(`/${type}/${id}/watch/providers`);
    const region = (data.results && (data.results.ID || data.results.US)) || null;
    if (!region) {
      wrap.innerHTML = `<div class="loading">Info platform streaming belum tersedia untuk judul ini.</div>`;
      return;
    }
    const groups = [
      { label: "Streaming", list: region.flatrate },
      { label: "Sewa", list: region.rent },
      { label: "Beli", list: region.buy }
    ].filter(g => g.list && g.list.length);

    if (!groups.length) {
      wrap.innerHTML = `<div class="loading">Belum ada info platform streaming untuk judul ini.</div>`;
      return;
    }

    wrap.innerHTML = groups.map(g => `
      <div class="provider-group">
        <div class="provider-group-label">${g.label}</div>
        <div class="provider-icons">
          ${g.list.map(p => `
            <a href="${region.link}" target="_blank" rel="noopener" class="provider-item" title="${esc(p.provider_name)}">
              <img src="${IMG}${p.logo_path}" alt="${esc(p.provider_name)}" loading="lazy">
            </a>
          `).join("")}
        </div>
      </div>
    `).join("");
    attribution.style.display = "block";
  } catch (err) {
    wrap.innerHTML = `<div class="loading">Gagal memuat info platform.</div>`;
  }
}

function renderChunkedEpisodeGrid(episodes, targetNode, seasonNum = 1) {
  const chunkSize = 30;
  if (!episodes || episodes.length === 0) {
    targetNode.innerHTML = '<div class="loading">Tidak ada episode.</div>';
    return;
  }

  targetNode.innerHTML = `<div class="chunk-row" id="chunksTabs"></div><div class="ep-grid" id="chunksGrid"></div>`;
  const tabsContainer = targetNode.querySelector("#chunksTabs");
  const gridContainer = targetNode.querySelector("#chunksGrid");
  let totalChunks = Math.ceil(episodes.length / chunkSize);
  
  if (totalChunks > 1) {
    for (let i = 0; i < totalChunks; i++) {
      const start = i * chunkSize + 1;
      const end = Math.min((i + 1) * chunkSize, episodes.length);
      const tab = document.createElement("div");
      tab.className = `chunk-tab ${i === 0 ? 'active' : ''}`;
      tab.innerText = `Eps ${start} - ${end}`;
      tab.onclick = () => {
        tabsContainer.querySelectorAll(".chunk-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        populateGridItems(episodes.slice(i * chunkSize, (i + 1) * chunkSize), gridContainer);
      };
      tabsContainer.appendChild(tab);
    }
  } else {
    tabsContainer.style.display = "none";
  }
  populateGridItems(episodes.slice(0, chunkSize), gridContainer);
}

// Renders an episode guide (title, still, synopsis) for browsing only — no playback.
function populateGridItems(sliceRange, containerNode) {
  containerNode.innerHTML = sliceRange.map(ep => `
      <div class="ep-card" data-ep="${ep.episode_number}">
        <div class="ep-thumb-wrap">
          <img class="ep-thumb" src="${img(ep.still_path)}" onerror="this.onerror=null; this.src=FALLBACK;" loading="lazy">
        </div>
        <div class="ep-body">
          <div class="ep-num">EPISODE ${ep.episode_number}</div>
          <div class="ep-name">${esc(ep.name)}</div>
          <div class="ep-desc">${esc(ep.overview || "Tidak ada deskripsi sinopsis episode.")}</div>
        </div>
      </div>
    `).join("");
}

// Page Navigation Functions
function showPage(page) {
  if (activePage) scrollHistoryMap[activePage] = window.scrollY;
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page + "Page").classList.add("active");
  document.querySelectorAll(".nav-btn[data-page]").forEach(b => b.classList.toggle("active", b.dataset.page === page));
  activePage = page;
  if (page === "home") loadHome();
  if (page === "favorites") renderFavs();
  if (page === "history") renderHistory();
  setTimeout(() => window.scrollTo(0, scrollHistoryMap[page] || 0), 40);
}

function navigate(page) { 
  pageStack.push(page);
  if (window.history.pushState) window.history.pushState({ page: page }, "");
  showPage(page); 
}

function deleteHistoryItem(e, id, mediaType) {
  e.stopPropagation();
  let hist = getHistory();
  hist = hist.filter(x => !(x.id == id && (x.media_type || "movie") === mediaType));
  saveHistory(hist);
  renderHistory();
  if (activePage === 'home') loadHome();
}

function clearAllHistory() {
  if (getHistory().length === 0) return;
  if (confirm("Apakah kamu yakin ingin menghapus semua riwayat tontonan?")) {
    saveHistory([]);
    renderHistory();
    if (activePage === 'home') loadHome();
  }
}

// Search Functions
const searchInputNode = document.getElementById("keyword");
const suggestionBoxNode = document.getElementById("suggestionBox");

searchInputNode.addEventListener("input", debounce(async (e) => {
  const query = e.target.value.trim();
  if (query.length < 2) {
    suggestionBoxNode.style.display = "none";
    return;
  }
  try {
    if (searchAbortController) searchAbortController.abort();
    searchAbortController = new AbortController();
    const data = await fetchTMDB(`/search/multi?query=${encodeURIComponent(query)}&page=1`, searchAbortController.signal);
    const filtered = data.results.filter(x => (x.media_type === "movie" || x.media_type === "tv") && x.poster_path).slice(0, 6);
    
    if (filtered.length === 0) {
      suggestionBoxNode.style.display = "none";
      return;
    }
    suggestionBoxNode.innerHTML = filtered.map(x => {
      const type = x.media_type;
      const title = x.title || x.name;
      const date = (x.release_date || x.first_air_date || "----").slice(0, 4);
      return `
        <div class="suggestion-item" onclick="selectSuggestion(${x.id}, '${type}')">
          <img class="sug-thumb" src="${img(x.poster_path)}" onerror="this.onerror=null; this.src=FALLBACK;">
          <div class="sug-info">
            <div class="sug-name">${esc(title)}</div>
            <div class="sug-meta">${type.toUpperCase()} • ${date}</div>
          </div>
        </div>
      `;
    }).join("");
    suggestionBoxNode.style.display = "block";
  } catch(err) {
    if (err.name !== 'AbortError') console.error(err);
  }
}, 250));

function selectSuggestion(id, type) {
  suggestionBoxNode.style.display = "none";
  searchInputNode.value = "";
  openDetail(id, type);
}

async function searchMovie(skip = false) {
  const q = searchInputNode.value.trim();
  const page = document.getElementById("pageInput").value || 1;
  if (!skip && !q) return;
  if (!q && skip) return;
  suggestionBoxNode.style.display = "none";
  const result = document.getElementById("searchResults");
  const status = document.getElementById("statusTxt");
  
  result.innerHTML = renderSkeletonGrid(8);
  status.innerHTML = "Menghubungkan core database server...";
  
  try {
    if (searchAbortController) searchAbortController.abort();
    searchAbortController = new AbortController();
    const data = await fetchTMDB(`/search/multi?query=${encodeURIComponent(q)}&page=${page}`, searchAbortController.signal);
    const filtered = data.results.filter(x => x.media_type === "movie" || x.media_type === "tv");

                </div>
              </div>
            `;
          }).join("")}
        </div>
      </div>
    `;

      const results = data.results.filter(x => x.poster_path).map(x => {
        if (!x.media_type) x.media_type = x.first_air_date ? "tv" : "movie";

    let seasonSelectHtml = `
      <div style="margin-top:28px;">
        <div class="sec-title" style="font-size:16px; margin-bottom:10px;">Daftar Season:</div>
        <select class="ep-select" style="width:100%; max-width:250px; height:44px; margin-bottom: 20px;" onchange="loadDetailEpisodes(${data.id}, this.value)">
    `;
    
    if (data.seasons && data.seasons.length > 0) {
      data.seasons.filter(s => s.season_number > 0).forEach(s => {
        seasonSelectHtml += `<option value="${s.season_number}">Season ${s.season_number}</option>`;
      });
    }
    
    seasonSelectHtml += `</select></div><div id="detailEpList"></div>`;
    document.getElementById("detailEpisodes").innerHTML = seasonSelectHtml;
    
    const firstValidSeason = data.seasons?.find(s => s.season_number > 0)?.season_number || 1;
    loadDetailEpisodes(data.id, firstValidSeason);
  }
  document.getElementById("detailBadges").innerHTML = badges;
  updateDetailFavBtn();
}

async function loadDetailEpisodes(id, season) {
  const wrap = document.getElementById("detailEpList");
  if (!wrap) return;
  wrap.innerHTML = `<div class="loading">Memuat daftar episode...</div>`;
  try {
    const data = await fetchTMDB(`/tv/${id}/season/${season}`);
    renderChunkedEpisodeGrid(data.episodes || [], wrap, season);
  } catch(err) {
    wrap.innerHTML = "";
  }
}

function toggleFav(item) {
  let favs = getFavs();
  const type = item.media_type || item.type || "movie";
  if (isFav(item.id, type)) {
    favs = favs.filter(x => !(x.id == item.id && (x.media_type || "movie") === type));
  } else {
    favs.unshift({
      id: item.id, media_type: type, title: item.title || item.name, poster_path: item.poster_path,
      vote_average: item.vote_average, release_date: item.release_date, first_air_date: item.first_air_date
    });
  }
  saveFavs(favs);
}

function quickFav(e, cachedKey) {
  e.stopPropagation();
  const item = itemMemoryCache.get(cachedKey);
  if (!item) return;
  toggleFav(item);
  const btns = document.querySelectorAll(`[data-fav-trigger="${cachedKey}"]`);
  const active = isFav(item.id, item.media_type || item.type);
  btns.forEach(btn => {
    btn.classList.toggle("active", active);
    btn.innerHTML = `<i class="fa-${active ? 'solid' : 'regular'} fa-heart"></i>`;
  });
  if (activePage === 'favorites') renderFavs();
}

function toggleDetailFav() {
  if (!currentItem) return;
  toggleFav(currentItem);
  updateDetailFavBtn();
}

function updateDetailFavBtn() {
  const btn = document.getElementById("detailFavBtn");
  const active = isFav(currentItem.id, currentItem.type);
  btn.classList.toggle("active", active);
  btn.innerHTML = `<i class="fa-${active ? "solid" : "regular"} fa-heart"></i>`;
}

// Event Listeners
document.querySelectorAll(".nav-btn[data-page]").forEach(btn => {
  btn.onclick = () => {
    pageStack = [btn.dataset.page];
    exitCinemaMode();
    if (window.history.pushState) window.history.pushState({ page: btn.dataset.page }, "");
    showPage(btn.dataset.page);
  };
});

window.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    const wrap = document.getElementById("playerWrap");
    if (wrap && wrap.classList.contains("cinema-mode")) {
      exitCinemaMode();
    } else if (activePage !== "home" && activePage !== "search" && activePage !== "favorites" && activePage !== "history") {
      goBack();
    }
  }
});

window.addEventListener("popstate", (e) => {
  if (pageStack.length > 1) {
    pageStack.pop();
    const prev = pageStack[pageStack.length - 1];
    showPage(prev);
  } else {
    showPage("home");
  }
});

// Fullscreen change event
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) exitCinemaMode();
});
document.addEventListener('webkitfullscreenchange', () => {
  if (!document.webkitFullscreenElement) exitCinemaMode();
});

// Periodic fullscreen check
setInterval(() => {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    document.body.classList.remove("cinema-active");
    document.getElementById("playerWrap")?.classList.remove("cinema-mode");
  }
}, 1000);

// Initialize
if (window.history && window.history.pushState) {
  window.history.replaceState({ page: "home" }, "");
}

// Apply saved theme before content loads
initTheme();

// Splash screen handler
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('splash-screen').classList.add('hidden');
  }, 2500);
});

loadHome();
        </script>
    </body>
</html>
